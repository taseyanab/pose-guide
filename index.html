<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Pose Guide">
    <title>Pose Guide</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #ffffff; /* High Contrast White */
            --bg: #000000;      /* Pure Minimal Black */
            --bg2: #0a0a0a;     /* Stark Charcoal Cards */
            --bg3: #121212;     /* Core Inputs & Elements */
            --bg4: #1a1a1a;
            --border: #222222;  /* Structured Borders */
            --border2: #333333;
            --text: #ffffff;    /* Crisp White Typography */
            --text2: #a1a1aa;   /* Muted Gray Secondary */
            --text3: #52525b;   /* Low-contrast Accent Labels */
            --danger: #ef4444;
            --r: 0px;           /* 0px Border Radius for an ultra-sleek, brutalist editorial look */
            --r-sm: 0px;
            --font-display: 'Bebas Neue', sans-serif; /* Your Brand Font */
            --font-sans: 'Inter', system-ui, sans-serif;
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bot: env(safe-area-inset-bottom, 0px);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-sans); font-size: 15px; -webkit-font-smoothing: antialiased; overscroll-behavior: none; }
        body { overflow-x: hidden; }

        /* ── NAV ── */
        .app-nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            background: rgba(0, 0, 0, 0.9); border-bottom: 1px solid var(--border);
            padding: calc(var(--safe-top) + 12px) 16px 12px;
            display: flex; align-items: center; gap: 12px;
            backdrop-filter: blur(12px);
        }
        .nav-back { background: none; border: none; color: var(--primary); font-size: 24px; cursor: pointer; padding: 4px; line-height: 1; }
        .nav-title { font-family: var(--font-display); font-size: 26px; font-weight: 400; color: var(--text); letter-spacing: 0.06em; flex: 1; text-transform: uppercase; }
        .nav-title span { color: var(--text2); }
        .nav-actions { display: flex; gap: 8px; }
        .nav-btn { background: none; border: 1px solid var(--border2); color: var(--text); font-family: var(--font-display); font-size: 14px; letter-spacing: 0.05em; padding: 4px 14px; border-radius: var(--r); cursor: pointer; transition: all 0.2s; white-space: nowrap; text-transform: uppercase; }
        .nav-btn:active { background: var(--primary); color: var(--bg); }
        .nav-btn.gold { border-color: var(--primary); color: var(--primary); }

        /* ── SCREENS ── */
        .screen { position: absolute; top: 0; left: 0; right: 0; bottom: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; transition: transform 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.3s; }
        .screen.hidden { transform: translateX(100%); opacity: 0; pointer-events: none; }
        .screen.slide-left { transform: translateX(-30%); opacity: 0; pointer-events: none; }
        .screen-content { padding-top: calc(var(--safe-top) + 70px); padding-bottom: calc(var(--safe-bot) + 30px); min-height: 100%; max-width: 600px; margin: 0 auto; }

        /* ── HOME HERO ── */
        .home-hero { padding: 40px 20px 20px; text-align: center; }
        .home-logo { font-family: var(--font-display); font-size: 52px; font-weight: 400; letter-spacing: 0.05em; color: var(--text); text-transform: uppercase; line-height: 1; }
        .home-logo em { color: var(--text2); font-style: normal; }
        .home-sub { font-family: var(--font-sans); font-size: 11px; color: var(--text3); letter-spacing: 0.2em; text-transform: uppercase; margin-top: 8px; font-weight: 700; }

        .client-block { margin: 16px; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r); padding: 20px; }
        .client-label { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text3); margin-bottom: 8px; font-weight: 700; }
        .client-input { width: 100%; background: none; border: none; border-bottom: 1px solid var(--border2); color: var(--text); font-family: var(--font-display); font-size: 28px; letter-spacing: 0.04em; padding: 4px 0 8px; outline: none; transition: border-color 0.2s; text-transform: uppercase; }
        .client-input:focus { border-color: var(--primary); }
        .client-input::placeholder { color: var(--text3); }

        .checklist-block { margin: 0 16px 16px; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r); padding: 20px; }
        .checklist-title { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text2); margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; font-weight: 700; }
        .checklist-add-btn { background: none; border: none; color: var(--primary); font-size: 22px; cursor: pointer; }
        .checklist-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
        .checklist-item:last-child { border-bottom: none; }
        .check-box { width: 18px; height: 18px; border: 1px solid var(--border2); border-radius: var(--r-sm); cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; }
        .check-box.checked { background: var(--primary); border-color: var(--primary); }
        .check-box.checked::after { content: '✓'; color: #000000; font-size: 11px; font-weight: 900; }
        .check-label { flex: 1; font-size: 14px; color: var(--text); }
        .check-label.checked { text-decoration: line-through; color: var(--text3); }
        .check-del { background: none; border: none; color: var(--text3); font-size: 16px; cursor: pointer; padding: 4px; }

        .section-label { font-family: var(--font-display); font-size: 16px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text2); padding: 16px 20px 8px; font-weight: 400; }

        .session-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 16px 16px; }
        .session-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r); padding: 24px 16px; cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden; }
        .session-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--primary); opacity: 0; transition: opacity 0.2s; }
        .session-card:active { background-color: #111111; }
        .session-card:active::before, .session-card.active::before { opacity: 1; }
        .session-card-icon { font-size: 24px; margin-bottom: 8px; filter: grayscale(100%); }
        .session-card-name { font-family: var(--font-display); font-size: 22px; font-weight: 400; letter-spacing: 0.04em; color: var(--text); text-transform: uppercase; }
        .session-card-count { font-size: 11px; color: var(--text3); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.05em; }

        .favs-row { margin: 0 16px 8px; }
        .favs-btn { width: 100%; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r); padding: 16px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: all 0.2s; }
        .favs-btn:active { background-color: #111111; }
        .favs-btn-icon { color: var(--primary); font-size: 18px; }
        .favs-btn-text { font-family: var(--font-display); font-size: 20px; letter-spacing: 0.04em; color: var(--text); text-transform: uppercase; }
        .favs-btn-count { margin-left: auto; font-size: 12px; color: var(--text3); font-weight: 600; }

        /* ── SESSION LENGTHS ── */
        .length-list { padding: 0 16px 16px; display: flex; flex-direction: column; gap: 12px; }
        .length-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r); padding: 20px; cursor: pointer; display: flex; align-items: center; gap: 16px; transition: all 0.2s; }
        .length-card:active { background-color: #111111; }
        .length-badge { width: 46px; height: 46px; border-radius: 0%; border: 1px solid var(--primary); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .length-badge-text { font-family: var(--font-display); font-size: 16px; color: var(--primary); text-align: center; line-height: 1; text-transform: uppercase; }
        .length-info { flex: 1; }
        .length-name { font-family: var(--font-display); font-size: 24px; font-weight: 400; text-transform: uppercase; letter-spacing: 0.04em; }
        .length-meta { font-size: 12px; color: var(--text2); margin-top: 4px; }
        .length-arrow { color: var(--text3); font-size: 16px; }

        /* ── ZONE VIEW ── */
        .zone-tabs { display: flex; overflow-x: auto; gap: 8px; padding: 0 16px 16px; scrollbar-width: none; }
        .zone-tabs::-webkit-scrollbar { display: none; }
        .zone-tab { flex-shrink: 0; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r); padding: 8px 16px; font-family: var(--font-display); font-size: 15px; letter-spacing: 0.05em; color: var(--text2); cursor: pointer; transition: all 0.2s; white-space: nowrap; text-transform: uppercase; }
        .zone-tab.active { background: var(--primary); border-color: var(--primary); color: #000000; }
        .zone-tab-add { flex-shrink: 0; background: none; border: 1px dashed var(--border2); border-radius: var(--r); padding: 8px 14px; font-family: var(--font-display); font-size: 15px; color: var(--text3); cursor: pointer; text-transform: uppercase; }

        .zone-notes-block { margin: 0 16px 12px; background: var(--bg3); border-radius: var(--r-sm); padding: 14px; border: 1px solid var(--border); }
        .zone-notes-input { width: 100%; background: none; border: none; color: var(--text2); font-family: var(--font-sans); font-size: 13px; resize: none; outline: none; min-height: 44px; }
        .zone-notes-input::placeholder { color: var(--text3); }

        .zone-timer-block { margin: 0 16px 16px; background: var(--bg3); border-radius: var(--r-sm); border: 1px solid var(--border); padding: 14px; display: flex; align-items: center; gap: 12px; }
        .timer-display { font-family: var(--font-display); font-size: 44px; font-weight: 400; color: var(--primary); letter-spacing: 0.02em; min-width: 95px; line-height: 1; }
        .timer-display.warning { color: var(--danger); }
        .timer-controls { display: flex; gap: 8px; flex: 1; justify-content: flex-end; align-items: center; }
        .timer-btn { background: var(--bg4); border: 1px solid var(--border2); color: var(--text); font-size: 18px; width: 42px; height: 42px; border-radius: 0%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
        .timer-btn:active { background: var(--primary); color: var(--bg); }
        .timer-btn.start { background: var(--primary); border-color: var(--primary); color: #000000; font-family: var(--font-display); font-size: 16px; text-transform: uppercase; letter-spacing: 0.05em; width: 56px; height: 42px; }
        .timer-set { display: flex; gap: 6px; align-items: center; }
        .timer-set input { width: 56px; background: var(--bg4); border: 1px solid var(--border2); border-radius: var(--r-sm); color: var(--text); font-family: var(--font-display); font-size: 18px; text-align: center; padding: 6px; outline: none; }

        .poses-list { padding: 0 16px 80px; display: flex; flex-direction: column; gap: 12px; }
        .pose-add-btn { margin: 0 16px 12px; width: calc(100% - 32px); background: none; border: 1px dashed var(--border2); border-radius: var(--r); padding: 16px; color: var(--text2); font-family: var(--font-display); font-size: 16px; letter-spacing: 0.05em; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; text-transform: uppercase; }
        .pose-add-btn:active { border-color: var(--primary); color: var(--primary); }

        .pose-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; transition: all 0.2s; }
        .pose-card.dragging { opacity: 0.5; border-color: var(--primary); }
        .pose-card.drag-over { border-color: var(--primary); border-style: dashed; }
        .pose-header { display: flex; align-items: center; gap: 12px; padding: 16px; }
        .pose-drag { color: var(--text3); font-size: 16px; cursor: grab; padding: 4px; flex-shrink: 0; touch-action: none; }
        .pose-drag:active { color: var(--primary); }
        .pose-num { font-family: var(--font-display); font-size: 16px; color: var(--text3); min-width: 20px; }
        .pose-name { flex: 1; font-family: var(--font-display); font-size: 20px; font-weight: 400; letter-spacing: 0.03em; color: var(--text); cursor: pointer; text-transform: uppercase; }
        .pose-star { background: none; border: none; font-size: 18px; cursor: pointer; padding: 4px; transition: transform 0.2s; filter: grayscale(100%); }
        .pose-star:active { transform: scale(1.3); }
        .pose-expand { background: none; border: none; color: var(--text3); font-size: 14px; cursor: pointer; padding: 4px; transition: transform 0.25s; }
        .pose-expand.open { transform: rotate(180deg); }
        .pose-body { border-top: 1px solid var(--border); padding: 16px; display: none; background-color: rgba(255, 255, 255, 0.01); }
        .pose-body.open { display: block; }
        .pose-desc { font-size: 13px; color: var(--text2); line-height: 1.6; margin-bottom: 12px; }
        .pose-link-row { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; }
        .pose-link-input { flex: 1; background: var(--bg3); border: 1px solid var(--border2); border-radius: var(--r-sm); padding: 10px; color: var(--text); font-size: 13px; outline: none; }
        .pose-link-input::placeholder { color: var(--text3); }
        .pose-link-go { background: var(--primary); border: none; border-radius: var(--r-sm); color: #000000; font-family: var(--font-display); font-size: 14px; padding: 8px 14px; cursor: pointer; white-space: nowrap; text-transform: uppercase; font-weight: 400; letter-spacing: 0.04em; }
        .pose-actions { display: flex; gap: 8px; }
        .pose-action-btn { flex: 1; background: var(--bg3); border: 1px solid var(--border2); border-radius: var(--r-sm); color: var(--text2); font-family: var(--font-display); font-size: 13px; padding: 8px; cursor: pointer; transition: all 0.2s; text-transform: uppercase; letter-spacing: 0.04em; }
        .pose-action-btn.del { color: var(--danger); border-color: var(--danger); }
        .pose-action-btn:active { opacity: 0.7; }

        /* ── TIMERS & LABELS ── */
        .pose-time-chip { display: inline-flex; align-items: center; gap: 5px; background: var(--bg3); border: 1px solid var(--border2); border-radius: var(--r-sm); padding: 4px 12px; font-size: 12px; color: var(--text3); cursor: pointer; transition: all 0.2s; flex-shrink: 0; }
        .pose-time-chip:active { border-color: var(--primary); color: var(--primary); }
        .pose-time-chip.running { border-color: var(--primary); color: var(--primary); background: rgba(255, 255, 255, 0.05); }
        .pose-time-chip.warning { border-color: var(--danger); color: var(--danger); }
        .pose-direction-label { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text3); margin-bottom: 6px; font-weight: 700; }

        /* ── MODAL WINDOWS ── */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 200; display: flex; align-items: flex-end; opacity: 0; pointer-events: none; transition: opacity 0.25s; backdrop-filter: blur(8px); }
        .modal-overlay.open { opacity: 1; pointer-events: all; }
        .modal { background: var(--bg2); border-radius: var(--r); width: 100%; max-width: 600px; margin: 0 auto; padding: 24px; padding-bottom: calc(24px + var(--safe-bot)); border-top: 1px solid var(--border); transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); }
        .modal-overlay.open .modal { transform: translateY(0); }
        .modal-title { font-family: var(--font-display); font-size: 28px; font-weight: 400; margin-bottom: 20px; color: var(--text); text-transform: uppercase; letter-spacing: 0.04em; }
        .modal-field { margin-bottom: 16px; }
        .modal-label { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text3); margin-bottom: 8px; font-weight: 700; }
        .modal-input { width: 100%; background: var(--bg3); border: 1px solid var(--border2); border-radius: var(--r-sm); padding: 12px; color: var(--text); font-family: var(--font-sans); font-size: 14px; outline: none; transition: border-color 0.2s; }
        .modal-input:focus { border-color: var(--primary); }
        .modal-textarea { min-height: 90px; resize: none; }
        .modal-btns { display: flex; gap: 10px; margin-top: 24px; }
        .modal-btn { flex: 1; padding: 14px; border-radius: var(--r); font-family: var(--font-display); font-size: 16px; letter-spacing: 0.05em; text-transform: uppercase; cursor: pointer; border: none; transition: opacity 0.2s; }
        .modal-btn:active { opacity: 0.8; }
        .modal-btn.primary { background: var(--primary); color: #000000; }
        .modal-btn.secondary { background: var(--bg3); color: var(--text2); border: 1px solid var(--border2); }

        /* ── INTERNALS ── */
        .empty { text-align: center; padding: 50px 20px; color: var(--text3); }
        .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }
        .empty-text { font-family: var(--font-display); font-size: 22px; letter-spacing: 0.04em; color: var(--text3); text-transform: uppercase; }
        .divider { height: 1px; background: var(--border); margin: 12px 16px; }
        
        /* ── TOAST ALERT ── */
        .toast { position: fixed; bottom: calc(24px + var(--safe-bot)); left: 50%; transform: translateX(-50%) translateY(20px); background: var(--bg3); border: 1px solid var(--border2); border-radius: var(--r-sm); padding: 12px 24px; font-size: 13px; color: var(--text); opacity: 0; pointer-events: none; transition: all 0.3s; white-space: nowrap; z-index: 300; font-weight: 500; }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .white-line { height: 1px; background: linear-gradient(90deg, transparent, var(--border2), transparent); margin: 20px; }
    </style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="poseModal">
    <div class="modal">
        <div class="modal-title" id="poseModalTitle">Add Pose</div>
        <div class="modal-field">
            <div class="modal-label">Pose Name</div>
            <input class="modal-input" id="poseModalName" placeholder="e.g. Looking over shoulder" />
        </div>
        <div class="modal-field">
            <div class="modal-label">Direction / Cue (optional)</div>
            <textarea class="modal-input modal-textarea" id="poseModalDesc" placeholder="What to say to your client during this pose..."></textarea>
        </div>
        <div class="modal-field">
            <div class="modal-label">Pinterest / Reference URL (optional)</div>
            <input class="modal-input" id="poseModalLink" placeholder="https://pinterest.com/pin/..." />
        </div>
        <div class="modal-btns">
            <button class="modal-btn secondary" onclick="closePoseModal()">Cancel</button>
            <button class="modal-btn primary" onclick="savePose()">Save</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="zoneModal">
    <div class="modal">
        <div class="modal-title">Add Zone</div>
        <div class="modal-field">
            <div class="modal-label">Zone Name</div>
            <input class="modal-input" id="zoneModalName" placeholder="e.g. Warm-Up, Feature Looks, Closing..." />
        </div>
        <div class="modal-btns">
            <button class="modal-btn secondary" onclick="closeZoneModal()">Cancel</button>
            <button class="modal-btn primary" onclick="saveZone()">Add Zone</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="checkModal">
    <div class="modal">
        <div class="modal-title">Add Checklist Item</div>
        <div class="modal-field">
            <div class="modal-label">Item</div>
            <input class="modal-input" id="checkModalInput" placeholder="e.g. Reflector packed" />
        </div>
        <div class="modal-btns">
            <button class="modal-btn secondary" onclick="closeCheckModal()">Cancel</button>
            <button class="modal-btn primary" onclick="saveCheckItem()">Add</button>
        </div>
    </div>
</div>

<div class="app-nav" id="appNav">
    <button class="nav-back" id="navBack" onclick="goBack()">‹</button>
    <div class="nav-title" id="navTitle">Pose // Guide</div>
    <div class="nav-actions" id="navActions"></div>
</div>

<div class="screen" id="screenHome">
    <div class="screen-content">
        <div class="home-hero">
            <div class="home-logo">Pose // <em>Guide</em></div>
            <div class="home-sub">Session Companion Matrix</div>
        </div>
        <div class="white-line"></div>

        <div class="client-block">
            <div class="client-label">Active Editorial Client</div>
            <input class="client-input" id="clientNameInput" placeholder="Client name..." oninput="saveClientName()" />
        </div>

        <div class="checklist-block">
            <div class="checklist-title">
                Pre-Session Checklist
                <button class="checklist-add-btn" onclick="openCheckModal()">+</button>
            </div>
            <div id="checklistItems"></div>
        </div>

        <div class="favs-row">
            <button class="favs-btn" onclick="showFavorites()">
                <span class="favs-btn-icon">★</span>
                <span class="favs-btn-text">Favorites</span>
                <span class="favs-btn-count" id="favsCount">0 poses</span>
            </button>
        </div>

        <div class="divider"></div>
        <div class="section-label">Session Architecture</div>
        <div class="session-grid" id="sessionGrid"></div>
    </div>
</div>

<div class="screen hidden" id="screenSession">
    <div class="screen-content">
        <div class="length-list" id="lengthList"></div>
    </div>
</div>

<div class="screen hidden" id="screenZones">
    <div class="screen-content">
        <div class="zone-tabs" id="zoneTabs"></div>
        <div id="zoneContent"></div>
    </div>
</div>

<div class="screen hidden" id="screenFavs">
    <div class="screen-content" id="favsContent"></div>
</div>

<script>
// ═══════════════════════════════════════════════════
//  DATA DEFAULTS & GLOBAL SPECIFICATION ENGINE
// ═══════════════════════════════════════════════════
const SESSION_TYPES = [
    { id: 'solo_female', name: 'Solo Female', icon: '👩' },
    { id: 'solo_male',   name: 'Solo Male',   icon: '🧔' },
    { id: 'studio',      name: 'Studio Library', icon: '💡' },
    { id: 'couples',     name: 'Couples Master', icon: '💑' },
    { id: 'group',       name: 'Group Architecture', icon: '👥' },
];

// ═══════════════════════════════════════════════════
//  SCREEN TRANSITION LAYERENGINE
// ═══════════════════════════════════════════════════
function navigateTo(screenId) {
    const currentScreen = screenHistory[screenHistory.length - 1];
    if (currentScreen === screenId) return;

    document.getElementById(currentScreen).classList.add('slide-left');
    
    const nextEl = document.getElementById(screenId);
    nextEl.classList.remove('hidden', 'slide-left');
    
    screenHistory.push(screenId);
    updateNavUI();
}

function goBack() {
    if (screenHistory.length <= 1) return;
    
    // Stop core system countdowns instantly if navigating out of active zones
    if(screenHistory[screenHistory.length - 1] === 'screenZones') {
        stopGlobalCountdownEngine();
    }

    const currentScreen = screenHistory.pop();
    document.getElementById(currentScreen).classList.add('hidden');
    
    const prevScreen = screenHistory[screenHistory.length - 1];
    document.getElementById(prevScreen).classList.remove('slide-left', 'hidden');
    
    updateNavUI();
    
    if (prevScreen === 'screenHome') {
        renderHome();
    } else if (prevScreen === 'screenSession') {
        renderSessionLengths();
    } else if (prevScreen === 'screenZones') {
        renderZonesView();
    }
}

function updateNavUI() {
    const currentScreen = screenHistory[screenHistory.length - 1];
    const backBtn = document.getElementById('navBack');
    const titleEl = document.getElementById('navTitle');
    const actionsEl = document.getElementById('navActions');
    
    actionsEl.innerHTML = '';
    backBtn.style.display = (screenHistory.length > 1) ? 'block' : 'none';

    if (currentScreen === 'screenHome') {
        titleEl.innerHTML = 'Pose // <span>Guide</span>';
    } else if (currentScreen === 'screenSession') {
        const typeObj = SESSION_TYPES.find(t => t.id === currentSessionType);
        titleEl.innerHTML = typeObj ? `${typeObj.name}` : 'Duration';
    } else if (currentScreen === 'screenZones') {
        titleEl.innerHTML = 'Execution Matrix';
        actionsEl.innerHTML = `<button class="nav-btn gold" onclick="openZoneModal()">+ Zone</button>`;
    } else if (currentScreen === 'screenFavs') {
        titleEl.innerHTML = 'Global Stars';
    }
}

function renderHome() {
    document.getElementById('clientNameInput').value = appData.clientName || '';
    renderChecklist();
    
    // Render Favorite Button Label Status Tracker
    document.getElementById('favsCount').innerText = `${appData.favorites.length} poses total`;

    const grid = document.getElementById('sessionGrid');
    grid.innerHTML = SESSION_TYPES.map(type => {
        return `
            <div class="session-card" onclick="selectSessionType('${type.id}')">
                <div class="session-card-icon">${type.icon}</div>
                <div class="session-card-name">${type.name}</div>
                <div class="session-card-count">System Configuration Array</div>
            </div>
        `;
    }).join('');
}

function saveClientName() {
    appData.clientName = document.getElementById('clientNameInput').value;
    saveStateToDisk();
}

function selectSessionType(id) {
    currentSessionType = id;
    navigateTo('screenSession');
    renderSessionLengths();
}

// ── CHECKLIST CONTROLLERS ──
function renderChecklist() {
    const container = document.getElementById('checklistItems');
    if (!appData.checklist || appData.checklist.length === 0) {
        container.innerHTML = '<div style="font-size:13px; color:var(--text3); padding:8px 0;">Checklist clear. No performance tasks initialized.</div>';
        return;
    }

    container.innerHTML = appData.checklist.map((item, idx) => `
        <div class="checklist-item">
            <div class="check-box ${item.checked ? 'checked' : ''}" onclick="toggleCheckItem(${idx})"></div>
            <div class="check-label ${item.checked ? 'checked' : ''}">${item.text}</div>
            <button class="check-del" onclick="deleteCheckItem(${idx})">×</button>
        </div>
    `).join('');
}

function toggleCheckItem(idx) {
    appData.checklist[idx].checked = !appData.checklist[idx].checked;
    saveStateToDisk();
    renderChecklist();
}

function openCheckModal() { document.getElementById('checkModal').classList.add('open'); document.getElementById('checkModalInput').focus(); }
function closeCheckModal() { document.getElementById('checkModal').classList.remove('open'); document.getElementById('checkModalInput').value = ''; }

function saveCheckItem() {
    const text = document.getElementById('checkModalInput').value.trim();
    if (text) {
        if (!appData.checklist) appData.checklist = [];
        appData.checklist.push({ text: text, checked: false });
        saveStateToDisk();
        renderChecklist();
    }
    closeCheckModal();
}

function deleteCheckItem(idx) {
    appData.checklist.splice(idx, 1);
    saveStateToDisk();
    renderChecklist();
}

            <div class="length-info">
                <div class="length-name">${len.name}</div>
                <div class="length-meta">${len.edits} • ${len.images}</div>
            </div>
            <div class="length-arrow">›</div>
        </div>
    `).join('');
}

function selectLength(lengthId) {
    currentLength = lengthId;
    currentZoneIndex = 0;
    
    // Core Engine Structural Setup Check
    const storageKey = `${currentSessionType}_${currentLength}`;
    if (!appData.customSessions[storageKey]) {
        // Build fresh functional runtime arrays inside storage engine matching default baseline parameters
        const originalDefaults = (DEFAULT_POSES[currentSessionType] && DEFAULT_POSES[currentSessionType][currentLength]) 
            ? DEFAULT_POSES[currentSessionType][lengthId] 
            : [{ name: 'Introductory Stance Framework', desc: 'Baseline portrait alignment stance sequence configuration.' }];
            
        appData.customSessions[storageKey] = [
            {
                name: 'Zone A: Foundation Mapping',
                notes: 'Establish standard composition frames.',
                poses: JSON.parse(JSON.stringify(originalDefaults))
            }
        ];
        saveStateToDisk();
    }

    navigateTo('screenZones');
    renderZonesView();
}

// ═══════════════════════════════════════════════════
//  SCREEN 3: MATRIX ZONE PRODUCTION BOARD
// ═══════════════════════════════════════════════════
function renderZonesView() {
    const storageKey = `${currentSessionType}_${currentLength}`;
    const zones = appData.customSessions[storageKey] || [];
    
    // Boundary structural sanitization checker
    if (currentZoneIndex >= zones.length) currentZoneIndex = 0;
    
    // 1. Render Horizontal Tabs Layer
    const tabsContainer = document.getElementById('zoneTabs');
    tabsContainer.innerHTML = zones.map((z, idx) => `
        <div class="zone-tab ${idx === currentZoneIndex ? 'active' : ''}" onclick="switchZone(${idx})">
            ${z.name.split(':')[0]}
        </div>
    `).join('');

    // 2. Target Component Rendering Core
    const contentContainer = document.getElementById('zoneContent');
    const activeZone = zones[currentZoneIndex];
    
    if (!activeZone) {
        contentContainer.innerHTML = '<div class="empty"><div class="empty-text">No active loops initialized.</div></div>';
        return;
    }

    contentContainer.innerHTML = `
        <div class="zone-notes-block">
            <div class="pose-direction-label">Zone Operational Framework Notes</div>
            <textarea class="zone-notes-input" placeholder="Add custom lighting strategies or notes for this location segment..." oninput="saveZoneNotes(this)">${activeZone.notes || ''}</textarea>
        </div>

        <div class="zone-timer-block">
            <div class="timer-display" id="timerDisplay">05:00</div>
            <div class="timer-controls">
                <div class="timer-set">
                    <input type="number" id="timerInputMin" value="5" min="1" max="99" onchange="syncTimerSettings()" />
                    <span style="font-family:var(--font-display); font-size:16px; color:var(--text3)">M</span>
                </div>
                <button class="timer-btn start" id="timerToggleBtn" onclick="toggleZoneTimer()">Run</button>
                <button class="timer-btn" onclick="resetZoneTimer()">⟲</button>
            </div>
        </div>

        <button class="pose-add-btn" onclick="openPoseModal(false)">+ Capture Vector Parameter</button>
        <div class="poses-list" id="posesLiveContainer"></div>
    `;

    renderPosesList(activeZone.poses);
    resetZoneTimer();
}

function switchZone(idx) {
    stopGlobalCountdownEngine();
    currentZoneIndex = idx;
    renderZonesView();
}

function saveZoneNotes(el) {
    const storageKey = `${currentSessionType}_${currentLength}`;
    appData.customSessions[storageKey][currentZoneIndex].notes = el.value;
    saveStateToDisk();
}

// ── TIMING SYSTEM CONTROL MATRIX ──
function syncTimerSettings() {
    if (isTimerRunning) return;
    const mins = parseInt(document.getElementById('timerInputMin').value) || 5;
    document.getElementById('timerDisplay').innerText = String(mins).padStart(2, '0') + ":00";
}

function toggleZoneTimer() {
    const btn = document.getElementById('timerToggleBtn');
    if (isTimerRunning) {
        stopGlobalCountdownEngine();
        btn.innerText = "Run";
        btn.style.background = "var(--primary)";
        btn.style.color = "#000000";
    } else {
        startGlobalCountdownEngine();
        btn.innerText = "Hold";
        btn.style.background = "var(--danger)";
        btn.style.color = "#ffffff";
    }
}

function startGlobalCountdownEngine() {
    if (isTimerRunning) return;
    isTimerRunning = true;
    
    const display = document.getElementById('timerDisplay');
    const currentString = display.innerText;
    const parts = currentString.split(':');
    
    timerDuration = (parseInt(parts[0]) * 60) + parseInt(parts[1]);

    countdownInterval = setInterval(() => {
        if (timerDuration <= 0) {
            stopGlobalCountdownEngine();
            display.classList.add('warning');
            display.innerText = "00:00 - COMPLETE";
            showToast("Zone operational frame completed.");
            
            // Audio pulse ping frequency generation core logic sequence
            try {
                let context = new (window.AudioContext || window.webkitAudioContext)();
                let osc = context.createOscillator();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, context.currentTime);
                osc.connect(context.destination);
                osc.start();
                osc.stop(context.currentTime + 0.3);
            } catch(e) {}
            
            return;
        }
        timerDuration--;
        let m = Math.floor(timerDuration / 60);
        let s = timerDuration % 60;
        display.innerText = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        
        if (timerDuration < 30) {
            display.classList.add('warning');
        } else {
            display.classList.remove('warning');
        }
    }, 1000);
}

function stopGlobalCountdownEngine() {
    isTimerRunning = false;
    clearInterval(countdownInterval);
    const btn = document.getElementById('timerToggleBtn');
    if(btn) {
        btn.innerText = "Run";
        btn.style.background = "var(--primary)";
        btn.style.color = "#000000";
    }
}

function resetZoneTimer() {
    stopGlobalCountdownEngine();
    const display = document.getElementById('timerDisplay');
    if(display) {
        display.classList.remove('warning');
        const mins = document.getElementById('timerInputMin') ? document.getElementById('timerInputMin').value : 5;
        display.innerText = String(mins).padStart(2, '0') + ":00";
    }
}

// ── POSES STRUCTURAL TRANSITION LAYER ──
function renderPosesList(posesArray) {
    const listEl = document.getElementById('posesLiveContainer');
    if (!posesArray || posesArray.length === 0) {
        listEl.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">No vectors tracked inside zone.</div></div>';
        return;
    }

    listEl.innerHTML = posesArray.map((pose, idx) => {
        const isStarred = appData.favorites.some(f => f.name === pose.name);
        return `
            <div class="pose-card" data-index="${idx}" draggable="true">
                <div class="pose-header">
                    <div class="pose-drag">☰</div>
                    <div class="pose-num">${String(idx + 1).padStart(2, '0')}</div>
                    <div class="pose-name" onclick="togglePoseDrawer(${idx})">${pose.name}</div>
                    <button class="pose-star" onclick="toggleStarPose(${idx})">${isStarred ? '★' : '☆'}</button>
                    <button class="pose-expand" id="arrow-${idx}" onclick="togglePoseDrawer(${idx})">▼</button>
                </div>
                <div class="pose-body" id="body-${idx}">
                    <div class="pose-direction-label">Directional Prompt Matrix</div>
                    <div class="pose-desc">${pose.desc || 'No procedural metrics defined for execution framework.'}</div>
                    
                    <div class="pose-link-row">
                        <input type="text" class="pose-link-input" id="link-${idx}" placeholder="Reference layout hyperlink..." value="${pose.link || ''}" onchange="savePoseLink(${idx}, this.value)" />
                        ${pose.link ? `<button class="pose-link-go" onclick="window.open('${pose.link}', '_blank')">View</button>` : ''}
                    </div>

                    <div class="pose-actions">
                        <button class="pose-action-btn" onclick="openPoseModal(true, ${idx})">Modify</button>
                        <button class="pose-action-btn del" onclick="deletePoseInstance(${idx})">Purge</button>
                    </div>
                </div>
            </div>
        `;
    }).join('');
}

function togglePoseDrawer(idx) {
    const b = document.getElementById(`body-${idx}`);
    const a = document.getElementById(`arrow-${idx}`);
    if (b.classList.contains('open')) {
        b.classList.remove('open');
        a.classList.remove('open');
    } else {
        b.classList.add('open');
        a.classList.add('open');
    }
}

function savePoseLink(idx, val) {
    const storageKey = `${currentSessionType}_${currentLength}`;
    appData.customSessions[storageKey][currentZoneIndex].poses[idx].link = val;
    saveStateToDisk();
}

// ═══════════════════════════════════════════════════
//  MODAL SYSTEM INTERNALS ENGINE
// ═══════════════════════════════════════════════════
let isEditMode = false;
let targetedPoseIndex = null;

function openPoseModal(isEdit = false, idx = null) {
    isEditMode = isEdit;
    targetedPoseIndex = idx;
    
    const m = document.getElementById('poseModal');
    const title = document.getElementById('poseModalTitle');
    
    if (isEditMode) {
        title.innerText = "Edit Pose Matrix Elements";
        const storageKey = `${currentSessionType}_${currentLength}`;
        const data = appData.customSessions[storageKey][currentZoneIndex].poses[idx];
        document.getElementById('poseModalName').value = data.name || '';
        document.getElementById('poseModalDesc').value = data.desc || '';
        document.getElementById('poseModalLink').value = data.link || '';
    } else {
        title.innerText = "Initialize Custom Pose Vector";
        document.getElementById('poseModalName').value = '';
        document.getElementById('poseModalDesc').value = '';
        document.getElementById('poseModalLink').value = '';
    }
    m.classList.add('open');
}

function closePoseModal() {
    document.getElementById('poseModal').classList.remove('open');
}

function savePose() {
    const name = document.getElementById('poseModalName').value.trim();
    const desc = document.getElementById('poseModalDesc').value.trim();
    const link = document.getElementById('poseModalLink').value.trim();
    
    if (!name) { showToast("Name context cannot be structural space character void."); return; }
    
    const storageKey = `${currentSessionType}_${currentLength}`;
    const targetArr = appData.customSessions[storageKey][currentZoneIndex].poses;
    
    if (isEditMode) {
        targetArr[targetedPoseIndex] = { name, desc, link };
        showToast("Vector parameters structured correctly.");
    } else {
        targetArr.push({ name, desc, link });
        showToast("New alignment target instantiated.");
    }
    
    saveStateToDisk();
    closePoseModal();
    renderZonesView();
}

function deletePoseInstance(idx) {
    if(confirm("Confirm structural purge validation routine?")) {
        const storageKey = `${currentSessionType}_${currentLength}`;
        appData.customSessions[storageKey][currentZoneIndex].poses.splice(idx, 1);
        saveStateToDisk();
        renderZonesView();
        showToast("Parameter dropped safely.");
    }
}

// ── COMPONENT LEVEL MANAGEMENT LAYER: ZONES ──
function openZoneModal() { document.getElementById('zoneModal').classList.add('open'); document.getElementById('zoneModalName').focus(); }
function closeZoneModal() { document.getElementById('zoneModal').classList.remove('open'); document.getElementById('zoneModalName').value = ''; }

function saveZone() {
    const name = document.getElementById('zoneModalName').value.trim();
    if (!name) return;
    
    const storageKey = `${currentSessionType}_${currentLength}`;
    appData.customSessions[storageKey].push({
        name: name,
        notes: '',
        poses: []
    });
    
    currentZoneIndex = appData.customSessions[storageKey].length - 1;
    saveStateToDisk();
    closeZoneModal();
    renderZonesView();
    showToast("Segment system loop array added.");
}

// ═══════════════════════════════════════════════════
//  FAVORITES CORE INTERFACE LAYER
// ═══════════════════════════════════════════════════
function toggleStarPose(idx) {
    const storageKey = `${currentSessionType}_${currentLength}`;
    const pose = appData.customSessions[storageKey][currentZoneIndex].poses[idx];
    
    const matchIdx = appData.favorites.findIndex(f => f.name === pose.name);
    if (matchIdx > -1) {
        appData.favorites.splice(matchIdx, 1);
        showToast("De-starred vector element.");
    } else {
        appData.favorites.push(pose);
        showToast("Added target matrix element to stars library.");
    }
    saveStateToDisk();
    renderZonesView();
}

function showFavorites() {
    navigateTo('screenFavs');
    const container = document.getElementById('favsContent');
    
    if (!appData.favorites || appData.favorites.length === 0) {
        container.innerHTML = `
            <div style="padding-top: calc(var(--safe-top) + 20px);">
                <div class="empty"><div class="empty-text">Star tracking storage array empty.</div></div>
            </div>
        `;
        return;
    }

    container.innerHTML = `
        <div style="padding:16px; font-family:var(--font-display); font-size:20px; color:var(--text2); letter-spacing:0.04em">STARS PORTFOLIO CONTROL ARCHIVE</div>
        <div class="poses-list" style="padding-top:0">
            ${appData.favorites.map((pose, idx) => `
                <div class="pose-card">
                    <div class="pose-header">
                        <div class="pose-num" style="color:var(--primary)">★</div>
                        <div class="pose-name" style="cursor:default">${pose.name}</div>
                        <button class="check-del" onclick="removeFavoriteDirectly(${idx})">×</button>
                    </div>
                    <div class="pose-body style" style="display:block; border-top:1px solid var(--border)">
                        <div class="pose-desc">${pose.desc || 'No framework specs verified.'}</div>
                        ${pose.link ? `<button class="pose-link-go" style="width:100%" onclick="window.open('${pose.link}', '_blank')">Launch Asset Ref Frame</button>` : ''}
                    </div>
                </div>
            `).join('')}
        </div>
    `;
}

function removeFavoriteDirectly(idx) {
    appData.favorites.splice(idx, 1);
    saveStateToDisk();
    showFavorites();
}

// ═══════════════════════════════════════════════════
//  KINETIC HARDWARE INTERACTION DRAG/DROP PIPELINE
// ═══════════════════════════════════════════════════
let elementDraggedSource = null;

function initDragAndDrop() {
    const list = document.getElementById('posesLiveContainer');
    if(!list) return;

    list.addEventListener('dragstart', function(e) {
        const card = e.target.closest('.pose-card');
        if(!card) return;
        elementDraggedSource = card;
        card.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
    });

    list.addEventListener('dragend', function(e) {
        const card = e.target.closest('.pose-card');
        if(card) card.classList.remove('dragging');
        
        const items = list.querySelectorAll('.pose-card');
        items.forEach(item => item.classList.remove('drag-over'));
    });

    list.addEventListener('dragover', function(e) {
        e.preventDefault();
        const overCard = e.target.closest('.pose-card');
        if(!overCard || overCard === elementDraggedSource) return;
        overCard.classList.add('drag-over');
    });

    list.addEventListener('dragleave', function(e) {
        const overCard = e.target.closest('.pose-card');
        if(overCard) overCard.classList.remove('drag-over');
    });

    list.addEventListener('drop', function(e) {
        e.preventDefault();
        const targetCard = e.target.closest('.pose-card');
        if (!targetCard || targetCard === elementDraggedSource) return;

        const srcIdx = parseInt(elementDraggedSource.getAttribute('data-index'));
        const targetIdx = parseInt(targetCard.getAttribute('data-index'));

        const storageKey = `${currentSessionType}_${currentLength}`;
        const poses = appData.customSessions[storageKey][currentZoneIndex].poses;
        
        // Mutate array indices using technical splice swap execution architecture
        const [movedElement] = poses.splice(srcIdx, 1);
        poses.splice(targetIdx, 0, movedElement);

        saveStateToDisk();
        renderZonesView();
    });
}

// Utility Toast Deployment System Core Engine
function showToast(msg) {
    const t = document.getElementById('toast');
    if(!t) return;
    t.innerText = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
